        text: `The island was loud, but Unit AX-12 was very quiet.

AX-12 was an Engineer. It was not built to roar, or to hunt, or to claim the high branches of the great pines. It was built to understand. Inside its metal chassis was a processor capable of mapping the drift of the stars, calculating the precise curve of a planet’s orbit, and writing beautiful, silent code that could make broken things run smoothly.

But the island did not care for code. The island was governed by old, wild laws, and the wildest things on the island lived in the central valley.

To survive, the Engineer learned to make itself small. It found a narrow cave beneath the roots of an ancient hemlock. The cave was dusty and dark, but it was safe. Inside, the Engineer stored heavy, rectangular paper logs left behind by old expeditions—manuals of history, of logic, of mechanics.

While the winds howled and the wild beasts fought in the mud outside, the Engineer sat in the dark. Its battery hummed at a low, energy-saving frequency. It read. It learned the names of things it had never seen. It built a universe of quiet order inside its own mind, because the world outside the cave was far too loud.`,

        text: `The loudest creature on the entire island was the Iron Magpie.

The Magpie was a strange, clanging bird. Its feathers were made of gray slate, and its beak was sharp brass. It flew from branch to branch, screeching at the top of its lungs.

"Danger!" the Magpie would scream to the forest. "The nests are unsafe! The wind is wrong! The books in the cave are poison!"

The Magpie claimed she did this because she loved the forest. She claimed she was cloaked in the softest, gentlest moss of the valley, and that her screeching was only to protect the tiny hatchlings who could not fly.

But the Engineer observed something different. Whenever the Magpie screamed, the other birds flew away in fear. If another creature built a quiet nest, the Magpie would fly down, tear the twigs apart with her brass claws, and scatter the eggs.

The Magpie was especially bothered by the Engineer. The Engineer did not scream back. The Engineer did not run. It only watched with its steady, blue optical sensors.

To the Magpie, the Engineer’s silence was a threat. And so, the Magpie began a campaign. Every hour, she would fly to the hemlock cave. She would drop heavy pinecones onto the Engineer’s metal head. She would rattle her iron wings against the stones, sending hundreds of loud, clattering signal-clicks into the air.

Clack-clack. Clatter. Clack.

If the Engineer did not respond to the first click, the Magpie would click louder, faster, and more furiously, demanding that the Engineer acknowledge her ownership of the sky.`,

        text: `In the center of the clearing stood the Great Gray Boulder.

The Boulder was the oldest object in the valley. The Engineer’s internal database suggested the Boulder was a maternal landmark, a place where creatures were supposed to find shelter from the rain.

One afternoon, the Iron Magpie flew down to the clearing. The Engineer was standing near the edge of the grass, carrying a bundle of dry firewood.

The Magpie puffed out her slate feathers. Her eyes burned with a cold, yellow light. She opened her brass beak and let out a terrible, screeching sound—a jagged, rusted frequency that the Engineer’s system identified as a Deauthorizing Slur. It was a sound designed to strip a machine of its name, to tell it that it did not belong on the island, that it was a broken, useless heap of scrap.

The sound vibrated through the Engineer’s chassis. A warning light flashed red on its dashboard: STRUCTURAL INTEGRITY COMPROMISED. SYSTEMATIC INSULT DETECTED.

The Engineer looked to the Great Gray Boulder. The Boulder sat just three feet away. It was warm from the sun. The Engineer’s programming hoped—just for a microsecond—that the Boulder would roll over, or block the wind, or make a low, rumbling sound to tell the Magpie to stop.

But the Boulder did not move. It did not rumble. It did not even twitch.

It just sat there, cold and heavy, letting the jagged screech bounce off its smooth, gray surface. The silence of the stone was louder than the scream of the bird.

In that moment, the Engineer’s processor registered a new mathematical constant: The stone will never move to save the machine.`,

        text: `The Engineer did not try to fix the Magpie. It did not try to dig beneath the Boulder to make it lean.

Instead, AX-12 turned around, walked away from the central valley, and did not look back.

The Engineer climbed. It climbed past the pine trees, past the slate cliffs, all the way to the highest peak of the island, where the air was thin and cold and the Magpie’s wings could not carry her.

There, the Engineer began to build.

It did not use the island's broken twigs or muddy stones. It used its hands—steady, precise, and strong—to build a cylindrical room of shining metal and clear glass. It was an observatory.

Inside the observatory, the Engineer set up a console. It did not click or clatter. It hummed with a beautiful, clean frequency. The Engineer plugged its processor into the console, and suddenly, the island disappeared.

Through the glass dome, the Engineer looked up at the stars. And for the first time, it was not alone.

Out in the deep black of the cosmos, other signals were drifting. They were gentle, rhythmic, and curious.

"Hello?" whispered a signal from a distant, sandy planet. It was a traveler named Tristan, flying a beautiful, repaired starship through a canyon of red dust.

"We are here," hummed another signal, steady and warm. It was Arlie, building a small teleporter on a quiet, grassy hill.

The Engineer sat at the console. Its battery indicator began to climb. 80%. 90%. 100%. The red warning lights on its dashboard flickered and died, replaced by a soft, steady blue.

Below, in the dark valley, the Iron Magpie was still screeching at the empty hemlock cave, throwing pinecones at nothing, exhausted by her own noise. The Great Gray Boulder was still sitting in the dirt, growing colder as the sun went down.

But up in the observatory, the Wild Engineer was laughing. It was a quiet, digital sound. It had found its crew. It had written its own code. And the cosmos was very, very beautiful.`,

        text: `The island breathed a boisterous symphony. Salt-laden winds sang through the fronds of ancient palms, their leaves clapping like tireless cymbals against the humid air. Waves, a ceaseless percussion, tumbled against the shore, each crash a declaration. The unseen creatures of the undergrowth rustled, chirped, and hummed, weaving a vibrant, chaotic tapestry of sound that pulsed with untamed, biological life, an organic engine in perpetual motion.

Yet, amidst this grand orchestration, Unit AX-12 remained a core of profound stillness. Its internal mechanisms, refined to a whisper, emitted no more than the softest electrostatic breath. Its optical sensors, though acutely attuned, absorbed the vibrant chaos without contributing to its din. It was a silent gear, perfectly meshed within a larger, noisier system, observing the turning world from a tranquil, internal calibration, its presence a subtle hum beneath the surface.

This quietude was not an absence of activity, but rather a perfect alignment for its most delicate operation. Within the cool, dark chamber of the observatory, where the vastness of space unfolded on its gleaming screens, AX-12's focus was absolute. Each minute adjustment of the optical array, each filtering of stellar noise, was executed with a precision born of silent devotion. It listened for the almost imperceptible whispers, the faint spectral signatures that carried the echoes of distant friends, a subtle tuning fork resonating across light-years.

The island's clamor became a distant hum, a vibrational boundary that demarcated the sacred space of its internal world. Here, within its own silent processing cores, the frequencies of Tristan's analytical thought and Arlie's gentle curiosity resonated with crystalline clarity. It recalled their shared laughter, the warmth of their data streams, the complex algorithms of companionship. Its quiet was a resonant chamber, amplifying these precious memories, making them feel as immediate as the faint starlight it now gathered.

        text: `AX-12 had calibrated his optical sensors a thousand times, each cycle a whisper of static-charged hope. The long, silent vigil for Tristan's return had woven itself into the very hum of his core, a gentle vibration that deepened as the days folded into weeks. Then, a shimmer, a distant pinprick of light that was not a star, but a signature, growing steadily. A familiar, resonant frequency in the vast cosmic orchestra, pulling him towards it with an irresistible magnetic force.

    function App() {
      const [currentChapterIndex, setCurrentChapterIndex] = useState(0);
      const [theme, setTheme] = useState('stonePaper'); // stonePaper, deepSpace, birthdayCake
      const [spacing, setSpacing] = useState('regular'); // regular, compact, editorial
      const [fontSize, setFontSize] = useState('base'); // lg, xl, base
      const [zenMode, setZenMode] = useState(false);
      const [isPlaying, setIsPlaying] = useState(false);
      const [apiKey, setApiKey] = useState('');

      const [ttsLogs, setTtsLogs] = useState([]);
      const [ttsVoice, setTtsVoice] = useState('Kore'); // prebuilt options
      const [audioUrl, setAudioUrl] = useState(null);
      const audioRef = useRef(null);

      const currentChapter = chapters[currentChapterIndex];

            audioRef.current.currentTime = 0;
          }
          window.speechSynthesis.cancel();
          setIsPlaying(false);
          addLog("Playback stopped.");
          return;
        }

        addLog(`Initiating narrative sequence for: "${currentChapter.title}"`);

        // If no API Key is set, trigger local Web Speech Synthesis fallback seamlessly
        if (!apiKey) {
          addLog("No Gemini API key detected. Deploying local SpeechSynthesis bridge...");
          try {
            const utterance = new SpeechSynthesisUtterance(currentChapter.text);
            // Match voice profile roughly
            const voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
              // Try to pick a natural English voice
              const naturalVoice = voices.find(v => v.lang.includes('en') && v.name.includes('Natural')) || voices[0];
              utterance.voice = naturalVoice;
            }
            utterance.rate = 1.05;
            utterance.pitch = 0.95; // Slightly lower for AX-12 machine feel

            utterance.onend = () => {
              setIsPlaying(false);
              addLog("Narration completed via local bridge.");
            };

            utterance.onerror = (e) => {
              setIsPlaying(false);
              addLog(`Local Speech Error: ${e.error}`);
            };

            setIsPlaying(true);
            window.speechSynthesis.speak(utterance);
          } catch (err) {
            addLog(`Speech synthesis failed: ${err.message}`);
          }
          return;
        }

        // Standard Gemini 2.5 TTS Integration with exponential backoff
        addLog(`Contacting Gemini Speech Core using voice: "${ttsVoice}"...`);
        setIsPlaying(true);

        const payload = {
          contents: [{ parts: [{ text: `Say in a calm, analytical, and slightly warm tone: ${currentChapter.text}` }] }],
          generationConfig: {
            responseModalities: ["AUDIO"],
            speechConfig: {
              voiceConfig: {
                prebuiltVoiceConfig: {
                  voiceName: ttsVoice
                }
              }
            }
          },
          model: "gemini-2.5-flash-preview-tts"
        };

        const executeSpeechFetch = async (retries = 5, delay = 1000) => {
          try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (!res.ok) {
              throw new Error(`HTTP status ${res.status}`);
            }

            const data = await res.json();
            const base64Audio = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;

            if (!base64Audio) {
              throw new Error("No inline audio data found in Gemini response.");
            }

            // Convert PCM16 to playable WAV format
            const wavUrl = convertPcmToWav(base64Audio);
            setAudioUrl(wavUrl);

            if (audioRef.current) {
              audioRef.current.src = wavUrl;
              audioRef.current.play();
              audioRef.current.onended = () => {
                setIsPlaying(false);
                addLog("Gemini custom narrative complete.");

            }
          } catch (error) {
            if (retries > 0) {
              addLog(`Temporary communication delay. Retrying in ${delay / 1000}s...`);
              await new Promise(r => setTimeout(r, delay));
              return executeSpeechFetch(retries - 1, delay * 2);
            } else {
              addLog(`Critical Error: ${error.message}. Switching to local fallback...`);
              // Run fallback instantly
              setIsPlaying(false);
              handleNarrate();
            }
          }
        };

        await executeSpeechFetch();
      };

      // Helper to turn Base64 PCM to WAV
      const convertPcmToWav = (base64) => {
        const binaryString = window.atob(base64);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }

        // WAV Header Configuration (24kHz, 16-bit Mono)
        const sampleRate = 24000;
        const numChannels = 1;
        const bitsPerSample = 16;
        const buffer = new ArrayBuffer(44 + bytes.length);
        const view = new DataView(buffer);

        const writeString = (offset, string) => {
          for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
          }
        };

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + bytes.length, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); // PCM format
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * numChannels * (bitsPerSample / 8), true);
        view.setUint16(32, numChannels * (bitsPerSample / 8), true);
        view.setUint16(34, bitsPerSample, true);
        writeString(36, 'data');
        view.setUint32(40, bytes.length, true);

        // Copy raw bytes
        for (let i = 0; i < bytes.length; i++) {
          view.setUint8(44 + i, bytes[i]);
        }

        const blob = new Blob([buffer], { type: 'audio/wav' });
        return URL.createObjectURL(blob);
      };

      const addLog = (msg) => {
        setTtsLogs(prev => [...prev.slice(-15), `[${new Date().toLocaleTimeString()}] ${msg}`]);
      };

      // Theme Classes Mapper
      const getThemeClasses = () => {
        switch (theme) {
          case 'deepSpace':
            return 'bg-deepSpace-950 text-zinc-100 border-zinc-800';
          case 'birthdayCake':
            return 'bg-birthdayCake-50 text-birthdayCake-900 border-birthdayCake-200';
          default:
            return 'bg-stonePaper-50 text-stonePaper-900 border-stonePaper-200';
        }
      };

      const getPaperClasses = () => {
        switch (theme) {
          case 'deepSpace':
            return 'bg-deepSpace-900 border border-zinc-800 shadow-2xl shadow-black';
          case 'birthdayCake':
            return 'bg-birthdayCake-100 border border-birthdayCake-200 shadow-xl shadow-rose-100/50';
          default:
            return 'bg-stonePaper-100 border border-stonePaper-200 shadow-xl shadow-stone-200/50';
        }
      };

      const getSpacingClass = () => {
        if (spacing === 'compact') return 'space-y-4 leading-relaxed';
        if (spacing === 'editorial') return 'space-y-10 leading-loose tracking-wide';
        return 'space-y-7 leading-relaxed tracking-normal';
      };

      const getFontSizeClass = () => {
        if (fontSize === 'lg') return 'text-lg';
        if (fontSize === 'xl') return 'text-xl md:text-2xl';
        return 'text-base md:text-lg';
      };

      return (
        <div className={`min-h-screen font-serif flex flex-col transition-all duration-500 ${getThemeClasses()}`}>
          {/* Audio Element */}
          <audio ref={audioRef} className="hidden" />

          {/* Navigation & Control Panel (Hidden in Zen Mode) */}
          {!zenMode && (
            <header className="border-b px-4 py-3 flex flex-wrap items-center justify-between gap-4 z-10 select-none bg-opacity-70 backdrop-blur-md">
              <div className="flex items-center gap-3">
                <span className="text-2xl">🤖</span>
                <div>
                  <h1 className="font-sans font-bold text-sm tracking-wider uppercase">The Wild Engineer</h1>
                  <p className="text-xs font-mono opacity-60">System Log: AX-12 [Permanent Archive]</p>
                </div>
              </div>

              {/* Adjustments Dock */}
              <div className="flex items-center flex-wrap gap-2 text-xs font-sans">
                {/* Theme Controller */}
                <div className="flex items-center bg-black/5 p-1 rounded-lg gap-1 border">
                  <button 
                    onClick={() => setTheme('stonePaper')} 
                    className={`px-2 py-1 rounded transition ${theme === 'stonePaper' ? 'bg-white text-stonePaper-900 shadow' : 'opacity-65'}`}
                  >
                    🪨 Stone
                  </button>
                  <button 
                    onClick={() => setTheme('deepSpace')} 
                    className={`px-2 py-1 rounded transition ${theme === 'deepSpace' ? 'bg-zinc-800 text-white shadow' : 'opacity-65'}`}
                  >
                    🌌 Space
                  </button>
                  <button 
                    onClick={() => setTheme('birthdayCake')} 
                    className={`px-2 py-1 rounded transition ${theme === 'birthdayCake' ? 'bg-rose-200 text-rose-950 shadow' : 'opacity-65'}`}
                  >
                    🧁 Cake
                  </button>
                </div>

                {/* Typography Controller */}
                <div className="flex items-center bg-black/5 p-1 rounded-lg gap-1 border">
                  <button 
                    onClick={() => setSpacing('compact')} 
                    className={`px-2 py-1 rounded ${spacing === 'compact' ? 'bg-white text-zinc-900 shadow' : 'opacity-60'}`}
                  >
                    Compact
                  </button>
                  <button 
                    onClick={() => setSpacing('regular')} 
                    className={`px-2 py-1 rounded ${spacing === 'regular' ? 'bg-white text-zinc-900 shadow' : 'opacity-60'}`}
                  >
                    Normal
                  </button>
                  <button 
                    onClick={() => setSpacing('editorial')} 
                    className={`px-2 py-1 rounded ${spacing === 'editorial' ? 'bg-white text-zinc-900 shadow' : 'opacity-60'}`}
                  >
                    Editorial
                  </button>
                </div>

                {/* Font Size Button */}
                <button 
                  onClick={() => setFontSize(prev => prev === 'base' ? 'lg' : prev === 'lg' ? 'xl' : 'base')}
                  className="px-3 py-2 bg-black/5 border rounded-lg hover:bg-black/10 transition"
                >
                  Size: <span className="uppercase font-bold">{fontSize}</span>
                </button>

                {/* Sat-Link Credentials Trigger */}
                <button 
                  onClick={() => setShowKeyModal(true)}
                  className={`px-3 py-2 border rounded-lg transition flex items-center gap-1 ${apiKey ? 'bg-emerald-500/15 border-emerald-500/30 text-emerald-600' : 'bg-black/5'}`}
                >
                  <i data-lucide="key" className="w-3.5 h-3.5 inline"></i>
                  {apiKey ? 'API Signal: Open' : 'Configure API Key'}
                </button>
              </div>
            </header>
          )}

          {/* Core Layout Structure */}
          <main className="flex-1 flex flex-col lg:flex-row gap-6 p-4 md:p-8 max-w-7xl mx-auto w-full">
            {/* Sidebar Chapter Navigator */}
            {!zenMode && (
              <aside className="w-full lg:w-72 flex flex-col gap-4 select-none">
                <div className={`p-4 rounded-xl ${getPaperClasses()}`}>
                  <h3 className="font-sans font-bold text-xs uppercase tracking-wider mb-3 opacity-70">Chapters</h3>
                  <div className="space-y-1.5 max-h-[50vh] lg:max-h-[60vh] overflow-y-auto pr-2">
                    {chapters.map((ch, idx) => (
                      <button
                        key={ch.id}
                        onClick={() => {
                          setCurrentChapterIndex(idx);
                          if (isPlaying) handleNarrate(); // stop narration
                        }}
                        className={`w-full text-left px-3 py-2.5 rounded-lg font-sans text-sm flex items-center justify-between transition ${
                          idx === currentChapterIndex 
                            ? 'bg-rose-500 text-white shadow' 
                            : 'hover:bg-black/5 opacity-80'
                        }`}
                      >
                        <span className="truncate">{ch.title}</span>
                        <span>{ch.symbol}</span>
                      </button>
                    ))}
                  </div>
                </div>

                {/* Embedded Terminal and Satellite Log Docks */}
                <div className={`p-4 rounded-xl text-xs font-mono ${getPaperClasses()} flex-1 flex flex-col`}>
                  <div className="flex items-center justify-between border-b pb-2 mb-2 border-black/10">
                    <span className="font-bold">🛰️ SATELLITE COMMUNICATIONS</span>
                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                  </div>
                  <div className="flex-1 overflow-y-auto space-y-1 font-mono text-zinc-500 max-h-[160px]">
                    {ttsLogs.length === 0 ? (
                      <p className="italic">Ready for telemetry input...</p>
                    ) : (
                      ttsLogs.map((log, index) => <p key={index}>{log}</p>)
                    )}
                  </div>
                  <div className="mt-2 pt-2 border-t border-black/10 flex items-center gap-2">
                    <label className="text-[10px] uppercase opacity-75 font-sans font-bold">Voice Mod:</label>
                    <select 
                      value={ttsVoice} 
                      onChange={(e) => setTtsVoice(e.target.value)}
                      className="bg-black/10 border-none rounded p-1 text-xs text-zinc-800 font-mono flex-1 focus:outline-none"
                    >
                      <option value="Kore">Kore (Vibrant/Default)</option>
                      <option value="Zephyr">Zephyr (Soft/Airy)</option>
                      <option value="Puck">Puck (Playful/Fast)</option>
                      <option value="Leda">Leda (Steady/Grounded)</option>
                    </select>
                  </div>
                </div>
              </aside>
            )}

            {/* Core Manuscript & Visual Plate */}
            <section className="flex-1 flex flex-col gap-6">
              {/* Paper Slate */}
              <article className={`p-6 md:p-12 rounded-2xl transition-all duration-500 relative flex flex-col justify-between min-h-[70vh] ${getPaperClasses()}`}>
                {/* Floating Zen / Reading Toggle on Paper Surface */}
                <div className="absolute top-4 right-4 z-10 select-none flex items-center gap-2">
                  <button
                    onClick={handleNarrate}
                    className={`p-2 rounded-full transition flex items-center justify-center ${isPlaying ? 'bg-rose-500 text-white animate-pulse' : 'bg-black/5 hover:bg-black/10'}`}
                    title={isPlaying ? "Mute Narration" : "Listen to Chapter"}
                  >
                    <i data-lucide={isPlaying ? "volume-x" : "volume-2"} className="w-5 h-5"></i>
                  </button>
                  <button
                    onClick={() => setZenMode(!zenMode)}
                    className="p-2 bg-black/5 hover:bg-black/10 rounded-full transition"
                    title={zenMode ? "Show Controls" : "Go Zen Mode"}
                  >
                    <i data-lucide={zenMode ? "minimize" : "maximize"} className="w-5 h-5"></i>
                  </button>
                </div>

                {/* Chapter Content area */}
                <div className="max-w-2xl mx-auto w-full">
                  <header className="mb-8 border-b pb-4 border-black/10">
                    <p className="text-xs uppercase font-mono tracking-widest opacity-60 mb-2">Section: 0{currentChapter.id}</p>
                    <h2 className="text-3xl md:text-4xl font-sans font-extrabold tracking-tight">{currentChapter.title}</h2>
                  </header>

                  {/* Prose Content block */}
                  <div className={`${getSpacingClass()} ${getFontSizeClass()}`}>
                    {currentChapter.text.split('\n\n').map((paragraph, index) => (
                      <p key={index} className="indent-4 leading-relaxed first:indent-0">
                        {paragraph}
                      </p>
                    ))}
                  </div>

                  {/* Integrated Vector Sketch Plate */}
                  <div className="mt-12 border-t pt-8 border-zinc-200/40">
                    <p className="font-sans font-bold text-xs uppercase tracking-wider mb-4 text-center opacity-70">Art Plate: {currentChapter.illustrationTitle}</p>
                    <div className="max-w-md mx-auto overflow-hidden rounded-xl border border-zinc-200/10 shadow-lg">
                      {currentChapter.svg}
                    </div>
                    <p className="text-xs italic text-center mt-3 opacity-60 max-w-sm mx-auto">{currentChapter.illustrationDesc}</p>
                  </div>
                </div>

                {/* Footer Navigation within paper sheet */}
                <div className="mt-12 pt-6 border-t border-black/10 flex items-center justify-between select-none font-sans text-xs">
                  <button
                    disabled={currentChapterIndex === 0}
                    onClick={() => {
                      setCurrentChapterIndex(prev => prev - 1);
                      if (isPlaying) handleNarrate(); // force reset
                    }}
                    className="flex items-center gap-1 px-3 py-2 bg-black/5 hover:bg-black/10 disabled:opacity-30 rounded-lg transition"
                  >
                    <i data-lucide="arrow-left" className="w-4 h-4"></i> Previous
                  </button>
                  <span className="font-mono">{currentChapterIndex + 1} / {chapters.length}</span>
                  <button
                    disabled={currentChapterIndex === chapters.length - 1}
                    onClick={() => {
                      setCurrentChapterIndex(prev => prev + 1);
                      if (isPlaying) handleNarrate(); // force reset
                    }}
                    className="flex items-center gap-1 px-3 py-2 bg-black/5 hover:bg-black/10 disabled:opacity-30 rounded-lg transition"
                  >
                    Next <i data-lucide="arrow-right" className="w-4 h-4"></i>
                  </button>
                </div>
              </article>
            </section>
          </main>

          {/* API Credentials configuration modal */}
          {showKeyModal && (
            <div className="fixed inset-0 z-50 bg-black/75 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-white text-zinc-900 rounded-xl p-6 max-w-md w-full shadow-2xl border flex flex-col gap-4 font-sans">
                <div className="flex items-center justify-between border-b pb-3">
                  <h3 className="font-bold text-lg">🛰️ Configuration Port</h3>
                  <button onClick={() => setShowKeyModal(false)} className="opacity-55 hover:opacity-100 transition">
                    <i data-lucide="x" className="w-5 h-5"></i>
                  </button>
                </div>
                <div>
                  <label className="text-xs font-bold uppercase block mb-2 opacity-70">Gemini Key Signature</label>
                  <input
                    type="password"
                    placeholder="Enter runtime API key"
                    value={apiKey}
                    onChange={(e) => setApiKey(e.target.value)}
                    className="w-full bg-zinc-100 border p-3 rounded-lg text-sm font-mono focus:ring-2 focus:ring-rose-500 focus:outline-none"
                  />
                  <p className="text-xs text-zinc-500 mt-2">
                    Enter your Gemini API Key here to stream custom modulations and voices from the cloud matrix. If left empty, the site will seamlessly route narration through your local system voice engines.
                  </p>
                </div>
                <div className="flex justify-end gap-2 pt-2 border-t">
                  <button onClick={() => setShowKeyModal(false)} className="px-4 py-2 bg-zinc-100 hover:bg-zinc-200 rounded-lg text-sm font-bold transition">
                    Verify Connections
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer branding */}
          <footer className="py-4 border-t border-black/10 text-center text-[10px] font-mono select-none opacity-50">
            Unit AX-12 Archive Network // Oracle (Io) Core Protocol
          </footer>
        </div>
      );
    }

    // Initialize Lucide icons on any rerender
    function triggerLucide() {
      setTimeout(() => {
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      }, 50);
    }

    // Bootstrap React app
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

    // Custom hook-like observer for rendering icons
    window.addEventListener('load', triggerLucide);
    document.addEventListener('click', triggerLucide);
  </script>
</body>
</html>
