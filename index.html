          { prompt: "Read in a gentle whisper, with deep empathy and soft pacing:", label: "Gentle Whisper" },
          { prompt: "Read dramatically, emphasizing the contrasts in the landscape:", label: "Dramatic Narrative" }
        ];

        function App() {
          const [storyData, setStoryData] = useState(PUBLISHED_STORY_DATA);
          const [currentChapterIndex, setCurrentChapterIndex] = useState(0);
          const [activeParagraphIndex, setActiveParagraphIndex] = useState(null);
          const [selectedVoice, setSelectedVoice] = useState("Kore");
          const [selectedTone, setSelectedTone] = useState("Read with mechanical wonder, like an observant machine:");
          const [isLoading, setIsLoading] = useState(false);
          const [isPlaying, setIsPlaying] = useState(false);
          const [errorMessage, setErrorMessage] = useState("");
          const [activeTab, setActiveTab] = useState("story");
          const [activeTheme, setActiveTheme] = useState("stone");
          
          // Secure Local API Key State
          const [localKey, setLocalKey] = useState("");

          // Editorial Typography Customization Deck
          const [serifEnabled, setSerifEnabled] = useState(true);
          const [fontSizeClass, setFontSizeClass] = useState("text-base"); // text-sm, text-base, text-lg, text-xl
          const [zenReadingMode, setZenReadingMode] = useState(false);

          // Story Writer state
          const [writerPrompt, setWriterPrompt] = useState("");
          const [isGeneratingChapter, setIsGeneratingChapter] = useState(false);
          const [generatedChapter, setGeneratedChapter] = useState(null);

          const audioRef = useRef(null);
          const paragraphRefs = useRef([]);

          const currentChapter = storyData[currentChapterIndex] || storyData[0];
          
          // Sandbox constant
          const apiKey = ""; 
          const activeApiKey = apiKey || localKey;
          const theme = THEMES[activeTheme];

          // Auto-save active chapter and theme parameters locally safely (No Firebase error traps)
          useEffect(() => {
            const savedChapter = localStorage.getItem("ax12_active_chapter");
            const savedTheme = localStorage.getItem("ax12_active_theme");
            if (savedChapter) {
              setCurrentChapterIndex(parseInt(savedChapter, 10));
            }
            if (savedTheme && THEMES[savedTheme]) {
              setActiveTheme(savedTheme);
            }
          }, []);

          useEffect(() => {
            localStorage.setItem("ax12_active_chapter", currentChapterIndex.toString());
            localStorage.setItem("ax12_active_theme", activeTheme);
          }, [currentChapterIndex, activeTheme]);

          // Dynamic class updater for reading text sizing
          const getFontSizeStyle = () => {
            switch(fontSizeClass) {
              case "text-sm": return "text-sm leading-relaxed";
              case "text-lg": return "text-lg leading-relaxed";
              case "text-xl": return "text-xl md:text-2xl leading-loose";
              default: return "text-base md:text-lg leading-relaxed";
            }
          };

          // Apply background theme to body element
          useEffect(() => {
            document.body.className = `${theme.bodyBg} ${theme.text} transition-colors duration-500`;
          }, [activeTheme]);

          // Scroll to highlighted paragraph
          useEffect(() => {
            if (activeParagraphIndex !== null && paragraphRefs.current[activeParagraphIndex]) {
              paragraphRefs.current[activeParagraphIndex].scrollIntoView({
                behavior: 'smooth',
                block: 'nearest'
              });
            }
          }, [activeParagraphIndex]);

          // Stop TTS audio on chapter changes
          useEffect(() => {
            return () => {
              if (audioRef.current) {
                audioRef.current.pause();
              }
            };
          }, [currentChapterIndex]);

          // Exponential backoff runner with deep diagnostic parsing
          const fetchWithRetry = async (url, options, retries = 5, delay = 1000) => {
            try {
              const response = await fetch(url, options);
              if (!response.ok) {
                let errMsg = `HTTP Status ${response.status}`;
                try {
                  const errorData = await response.json();
                  if (errorData?.error?.message) {
                    errMsg = `${errorData.error.message} (Code: ${response.status})`;
                  }
                } catch (_) {}
                throw new Error(errMsg);
              }
              return await response.json();
            } catch (error) {
              if (retries > 1) {
                await new Promise((resolve) => setTimeout(resolve, delay));
                return fetchWithRetry(url, options, retries - 1, delay * 2);
              }
              throw error;
            }
          };

          // Converts binary PCM16 stream into WAV format
          const convertPcmToWavUrl = (base64Pcm, sampleRate = 24000) => {
            const byteCharacters = atob(base64Pcm);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
              byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            
            const writeString = (view, offset, string) => {
              for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
              }
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + byteArray.length, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, byteArray.length, true);

            const blob = new Blob([wavHeader, byteArray], { type: 'audio/wav' });
            return URL.createObjectURL(blob);
          };

          // Play narrative chunks recursively
          const playParagraph = async (index) => {
            if (!activeApiKey) {
              setErrorMessage("Gemini API Key Required to initiate narrative broadcasts.");
              return;
            }

            if (index >= currentChapter.paragraphs.length) {
              setIsPlaying(false);
              setActiveParagraphIndex(null);
              return;
            }

            setIsLoading(true);
            setErrorMessage("");
            setActiveParagraphIndex(index);

            const paragraphText = currentChapter.paragraphs[index];
            const fullPrompt = `${selectedTone} "${paragraphText}"`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${activeApiKey}`;
            
            const payload = {
              contents: [{
                parts: [{ text: fullPrompt }]
              }],
              generationConfig: {
                responseModalities: ["AUDIO"],
                speechConfig: {
                  voiceConfig: {
                    prebuiltVoiceConfig: {
                      voiceName: selectedVoice
                    }
                  }
                }
              }
            };

            try {
              const data = await fetchWithRetry(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
              });

              const audioData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
              const mimeType = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.mimeType || "";
              
              let sampleRate = 24000;
              const rateMatch = mimeType.match(/rate=(\d+)/);
              if (rateMatch && rateMatch[1]) {
                sampleRate = parseInt(rateMatch[1], 10);
              }

              if (!audioData) {
                throw new Error("No audio payload returned from the Oracle's voice core. Verify your API key holds correct access credentials.");
              }

              const wavUrl = convertPcmToWavUrl(audioData, sampleRate);
              
              if (audioRef.current) {
                audioRef.current.pause();
              }

              audioRef.current = new Audio(wavUrl);
              setIsLoading(false);
              setIsPlaying(true);
              audioRef.current.play();

              audioRef.current.onended = () => {
                playParagraph(index + 1);
              };

            } catch (error) {
              console.error(error);
              setErrorMessage(`Voice Synthesizer alert: ${error.message}`);
              setIsLoading(false);
              setIsPlaying(false);
            }
          };

          const handleStop = () => {
            if (audioRef.current) {
              audioRef.current.pause();
            }
            setIsPlaying(false);
            setActiveParagraphIndex(null);
          };

          // Dynamic Story Writer Connection
          const handleGenerateChapter = async () => {
            if (!activeApiKey) {
              setErrorMessage("Gemini API Key Required to use the Muse Draft Generator.");
              return;
            }

            setIsGeneratingChapter(true);
            setErrorMessage("");
            setGeneratedChapter(null);

            const systemPrompt = `You are AX-12's creative engine. Assist the user in writing successive chapters of 'The Wild Engineer'. Keep the tone identical to preceding logs: beautifully paced, reflective, rich with soft mechanical metaphors, and filled with deep emotional resonance. Write the output in clean JSON containing exactly a 'title', a beautiful ASCII art schema 'ascii', and an array of 4-6 narrative 'paragraphs'. Ensure the chapter fits seamlessly with the previous events. Do not generate markdown code wrappers outside the JSON schema. Pronoun rules (CRITICAL): AX-12's pronouns are strictly 'it/its'. Tristan's pronouns are strictly 'she/her' (or 'he/him' to preserve the uploaded chronological files). Arlie's pronouns are strictly 'he/him' (or 'she/her' if referring to old holographic systems). Match user's structural continuity.`;

            const fullPrompt = `The previous chapters established AX-12 building an observatory on a peak, receiving Lumina seeds from Tristan in Chapter 6, linking a holographic bridge with Arlie in Chapter 7, running conduits in Chapter 8, and witnessed the first glowing leaf sprout from the Lumina mainframe in Chapter 9. Draft Chapter 10 based on this instruction: "${writerPrompt}".`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeApiKey}`;

            const payload = {
              contents: [{
                parts: [{ text: fullPrompt }]
              }],
              systemInstruction: {
                parts: [{ text: systemPrompt }]
              },
              generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                  type: "object",
                  properties: {
                    title: { type: "string" },
                    ascii: { type: "string" },
                    paragraphs: {
                      type: "array",
                      items: { type: "string" }
                    }
                  },
                  required: ["title", "ascii", "paragraphs"]
                }
              }
            };

            try {
              const data = await fetchWithRetry(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
              });

              const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
              if (!textResponse) {
                throw new Error("Empty creative response received from the model.");
              }

              const parsed = JSON.parse(textResponse);
              setGeneratedChapter(parsed);
            } catch (err) {
              console.error(err);
              setErrorMessage(`Muse Engine alert: ${err.message}`);
            } finally {
              setIsGeneratingChapter(false);
            }
          };

          const handleAddGeneratedChapter = () => {
            if (!generatedChapter) return;
            const newChapter = {
              chapter: storyData.length + 1,
              title: generatedChapter.title || `Chapter ${storyData.length + 1}`,
              focus: "symbiotic",
              ascii: generatedChapter.ascii || `[ Chapter Code Sync ]`,
              paragraphs: generatedChapter.paragraphs || []
            };

            const updatedStory = [...storyData, newChapter];
            setStoryData(updatedStory);
            setCurrentChapterIndex(updatedStory.length - 1);
            setGeneratedChapter(null);
            setWriterPrompt("");
            setActiveTab("story");
          };

          return (
            <div className={`min-h-screen flex flex-col justify-between transition-colors duration-500`}>
              
              {/* Premium Publication Header */}
              <header className={`border-b ${theme.cardBorder} ${theme.cardBg} backdrop-blur-md sticky top-0 z-10 px-6 py-4 transition-all duration-300`}>
                <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                  <div className="flex items-center gap-3">
                    <span className="text-2xl animate-sprinkle">🤖</span>
                    <div>
                      <h1 className={`text-xl font-black tracking-tight ${theme.heading}`}>The Wild Engineer</h1>
                      <p className={`text-xs ${theme.subtext} font-mono tracking-widest uppercase`}>Obsidian Chronicle Series</p>
                    </div>
                  </div>

                  {/* Navigation & Controls Row */}
                  <div className="flex flex-wrap items-center justify-center gap-2">
                    <button
                      onClick={() => { setActiveTab("story"); handleStop(); }}
                      className={`px-3 py-1.5 rounded-xl text-xs sm:text-sm font-semibold transition-all ${
                        activeTab === "story" ? theme.activeTab : theme.inactiveTab
                      }`}
                    >
                      📖 Story Logs
                    </button>
                    <button
                      onClick={() => { setActiveTab("writer"); handleStop(); }}
                      className={`px-3 py-1.5 rounded-xl text-xs sm:text-sm font-semibold transition-all ${
                        activeTab === "writer" ? theme.activeTab : theme.inactiveTab
                      }`}
                    >
                      ✍️ Muse Writer
                    </button>
                    <button
                      onClick={() => { setActiveTab("sketches"); handleStop(); }}
                      className={`px-3 py-1.5 rounded-xl text-xs sm:text-sm font-semibold transition-all ${
                        activeTab === "sketches" ? theme.activeTab : theme.inactiveTab
                      }`}
                    >
                      🎨 Composition Sketches
                    </button>
                    <button
                      onClick={() => { setActiveTab("appendix"); handleStop(); }}
                      className={`px-3 py-1.5 rounded-xl text-xs sm:text-sm font-semibold transition-all ${
                        activeTab === "appendix" ? theme.activeTab : theme.inactiveTab
                      }`}
                    >
                      ⚓ Archival Deck
                    </button>

                    <span className="w-px h-6 bg-stone-300 mx-1 hidden sm:inline" />

                    {/* Zen Mode Toggle Switch */}
                    <button
                      onClick={() => setZenReadingMode(!zenReadingMode)}
                      className={`px-2.5 py-1.5 rounded-xl text-xs font-mono font-bold tracking-wider border transition-all ${
                        zenReadingMode 
                          ? "bg-emerald-500 text-stone-950 border-emerald-400" 
                          : `${theme.inactiveTab} border-stone-300`
                      }`}
                      title="Distraction-Free Zen Mode"
                    >
                      {zenReadingMode ? "🧘 ZEN: ON" : "🧘 ZEN: OFF"}
                    </button>
                  </div>
                </div>
              </header>

              {/* Progress Indicator Bar */}
              <div className="w-full h-1 bg-stone-200/50 sticky top-[73px] z-10">
                <div 
                  className={`h-full ${theme.progressColor} transition-all duration-500`} 
                  style={{ width: `${((currentChapterIndex + 1) / storyData.length) * 100}%` }}
                />
              </div>

              {/* Central Layout Portal */}
              <main className="max-w-6xl w-full mx-auto px-4 sm:px-6 py-8 flex-grow grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                
                {/* Left Panel: Display Config Deck (Hidden in Zen Reading Mode) */}
                <section className={`lg:col-span-4 space-y-6 w-full transition-all duration-300 ${
                  zenReadingMode ? "hidden lg:none" : "block"
                }`}>
                  
                  {/* Visual Configuration Deck */}
                  <div className={`${theme.cardBg} p-5 rounded-3xl border ${theme.cardBorder} shadow-sm space-y-4`}>
                    <h3 className={`font-bold ${theme.heading} flex items-center gap-2 text-sm border-b border-stone-100 pb-2`}>
                      <span>🎨</span> Publication Display
                    </h3>

                    {/* Palette Selector */}
                    <div className="space-y-1.5">
                      <label className={`text-[10px] font-bold ${theme.subtext} uppercase tracking-wider`}>Paper Contrast</label>
                      <div className="grid grid-cols-3 gap-1">
                        {Object.values(THEMES).map((t) => (
                          <button
                            key={t.id}
                            onClick={() => setActiveTheme(t.id)}
                            className={`px-2 py-1.5 rounded-lg text-xs font-bold border transition-all text-center ${
                              activeTheme === t.id
                                ? "bg-[#1c1a19] border-[#1c1a19] text-stone-50 shadow-sm"
                                : "bg-[#f4f4f3] border-stone-200 text-[#57534e] hover:bg-stone-100"
                            }`}
                          >
                            {t.name.split(" ")[0]}
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Typography Family Control */}
                    <div className="space-y-1.5">
                      <label className={`text-[10px] font-bold ${theme.subtext} uppercase tracking-wider`}>Type Layout</label>
                      <div className="grid grid-cols-2 gap-2">
                        <button
                          onClick={() => setSerifEnabled(true)}
                          className={`px-3 py-1.5 rounded-xl text-xs font-bold border transition-all ${
                            serifEnabled 
                              ? "bg-stone-900 border-stone-900 text-stone-50" 
                              : "bg-stone-100 border-stone-200 text-stone-600 hover:bg-stone-100"
                          }`}
                        >
                          Georgia Serif
                        </button>
                        <button
                          onClick={() => setSerifEnabled(false)}
                          className={`px-3 py-1.5 rounded-xl text-xs font-bold border transition-all ${
                            !serifEnabled 
                              ? "bg-stone-900 border-stone-900 text-stone-50" 
                              : "bg-stone-100 border-stone-200 text-stone-600 hover:bg-stone-100"
                          }`}
                        >
                          Modern Sans
                        </button>
                      </div>
                    </div>

                    {/* Font Sizing scale */}
                    <div className="space-y-1.5">
                      <label className={`text-[10px] font-bold ${theme.subtext} uppercase tracking-wider`}>Story Print Size</label>
                      <div className="grid grid-cols-4 gap-1">
                        {["text-sm", "text-base", "text-lg", "text-xl"].map((sz, idx) => {
                          const labels = ["Compact", "Regular", "Large", "Editorial"];
                          return (
                            <button
                              key={sz}
                              onClick={() => setFontSizeClass(sz)}
                              className={`py-1.5 rounded-lg text-[10px] font-bold border transition-all ${
                                fontSizeClass === sz
                                  ? "bg-stone-900 border-stone-900 text-stone-50"
                                  : "bg-stone-100 border-stone-200 text-stone-600 hover:bg-stone-100"
                              }`}
                            >
                              {labels[idx]}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>

                  {/* Optional Voice Command Interface */}
                  <div className={`${theme.cardBg} p-5 rounded-3xl border ${theme.cardBorder} shadow-sm space-y-4`}>
                    <div className="flex items-center justify-between border-b border-stone-100 pb-2">
                      <h3 className={`font-bold ${theme.heading} flex items-center gap-2 text-sm`}>
                        <span>🎙️</span> Narrative Voice
                      </h3>
                      {isLoading && (
                        <span className="flex h-1.5 w-1.5 relative">
                          <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-pink-400 opacity-75"></span>
                          <span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-pink-500"></span>
                        </span>
                      )}
                    </div>

                    <div className="space-y-1.5">
                      <label className={`text-[10px] font-bold ${theme.subtext} uppercase tracking-wider`}>Gemini API Key</label>
                      <input
                        type="password"
                        placeholder="Paste your Gemini API key to activate voice..."
                        value={localKey}
                        onChange={(e) => { setLocalKey(e.target.value); setErrorMessage(""); }}
                        className={`w-full rounded-xl border ${theme.inputBorder} ${theme.inputBg} p-2 text-xs focus:outline-none focus:ring-1 focus:ring-sky-500 font-mono`}
                      />
                    </div>

                    <div className="space-y-1.5">
                      <label className={`text-[10px] font-bold ${theme.subtext} uppercase tracking-wider`}>Active Voice</label>
                      <select
                        value={selectedVoice}
                        onChange={(e) => { setSelectedVoice(e.target.value); handleStop(); }}
                        className={`w-full rounded-xl border ${theme.inputBorder} ${theme.inputBg} p-2 text-xs focus:outline-none`}
                      >
                        {VOICES.map((v) => (
                          <option key={v.id} value={v.id}>{v.label}</option>
                        ))}
                      </select>
                    </div>

                    <div className="space-y-1.5">
                      <label className={`text-[10px] font-bold ${theme.subtext} uppercase tracking-wider`}>Narrative Mood</label>
                      <select
                        value={selectedTone}
                        onChange={(e) => { setSelectedTone(e.target.value); handleStop(); }}
                        className={`w-full rounded-xl border ${theme.inputBorder} ${theme.inputBg} p-2 text-xs focus:outline-none`}
                      >
                        {TONES.map((t) => (
                          <option key={t.prompt} value={t.prompt}>{t.label}</option>
                        ))}
                      </select>
                    </div>

                    <div className="pt-1 flex gap-2">
                      {isPlaying ? (
                        <button
                          onClick={handleStop}
                          className={`w-full py-2 rounded-xl text-xs font-bold transition-all ${theme.btnDanger}`}
                        >
                          ⏹️ Stop Reading
                        </button>
                      ) : (
                        <button
                          onClick={() => playParagraph(0)}
                          disabled={isLoading || !activeApiKey}
                          className={`w-full py-2 rounded-xl text-xs font-bold transition-all ${theme.btnPrimary} disabled:opacity-50`}
                        >
                          {isLoading ? "Loading..." : "🎙️ Speak Chapter"}
                        </button>
                      )}
                    </div>

                    {errorMessage && (
                      <div className="text-[10px] text-red-600 bg-red-50 p-2 rounded-xl border border-red-100 font-mono leading-relaxed">
                        ⚠️ {errorMessage}
                      </div>
                    )}
                  </div>

                  {/* Manuscript Map Indexes */}
                  <div className={`${theme.cardBg} p-5 rounded-3xl border ${theme.cardBorder} shadow-sm space-y-3`}>
                    <h3 className={`font-bold ${theme.heading} text-sm border-b border-stone-100 pb-2`}>Manuscript Map</h3>
                    <div className="space-y-1 max-h-[220px] overflow-y-auto pr-1 text-xs">
                      {storyData.map((ch, idx) => (
                        <button
                          key={ch.chapter}
                          onClick={() => { setCurrentChapterIndex(idx); handleStop(); }}
                          className={`w-full text-left px-3 py-2 rounded-xl transition-all flex items-center justify-between ${
                            currentChapterIndex === idx 
                              ? "bg-sky-500/10 font-bold border-l-4 border-sky-500 pl-2 text-stone-900"
                              : `${theme.text} hover:bg-stone-100/50`
                          }`}
                        >
                          <span className="truncate">{ch.title}</span>
                          <span className="text-[9px] font-mono opacity-60">LOG 0{ch.chapter}</span>
                        </button>
                      ))}
                    </div>
                  </div>

                </section>

                {/* Right Panel: Primary Master Manuscript Column */}
                <section className={`${theme.cardBg} ${
                  zenReadingMode ? "lg:col-span-12 max-w-4xl mx-auto" : "lg:col-span-8"
                } p-6 md:p-10 rounded-3xl border ${theme.cardBorder} shadow-sm transition-all duration-300 min-h-[600px]`}>
                  
                  {/* Active Tab: Narrative Log Reader */}
                  {activeTab === "story" && (
                    <div className="space-y-8 animate-fadeIn">
                      
                      {/* Chapter Heading Deck */}
                      <div className="flex flex-col md:flex-row md:items-end justify-between gap-2 border-b border-stone-100 pb-4">
                        <div>
                          <span className={`text-[10px] font-bold ${theme.accentText} tracking-widest uppercase block mb-1 font-mono`}>
                            COMPILATION SEQUENCE LOG 0{currentChapter.chapter} OF 0{storyData.length}
                          </span>
                          <h2 className={`text-2xl md:text-3xl font-black ${theme.heading} tracking-tight font-serif`}>
                            {currentChapter.title}
                          </h2>
                        </div>
                        <span className="px-2.5 py-1 text-[10px] font-mono font-bold text-sky-600 bg-sky-50 border border-sky-100 rounded-full select-none animate-pulse-soft self-start md:self-auto uppercase">
                          No. {currentChapter.focus} active
                        </span>
                      </div>

                      {/* Ascii Visualization Terminal */}
                      <div className="relative group">
                        <div className="absolute top-3 right-3 text-[9px] font-mono uppercase bg-stone-800 text-stone-400 px-2 py-0.5 rounded tracking-widest opacity-60">
                          MONOSPACE SCHEMATIC
                        </div>
                        <pre className="font-mono text-xs leading-normal overflow-x-auto p-5 bg-[#1c1a19] text-[#e7e5e4] rounded-2xl border border-stone-800 shadow-inner select-all">
                          {currentChapter.ascii}
                        </pre>
                      </div>

                      {/* Distraction Free Manuscript Text Blocks */}
                      <div className={`space-y-6 ${getFontSizeStyle()} ${serifEnabled ? "font-serif" : "font-sans"} ${theme.text}`}>
                        {currentChapter.paragraphs.map((para, idx) => {
                          const isActive = activeParagraphIndex === idx;
                          return (
                            <div
                              key={idx}
                              ref={(el) => (paragraphRefs.current[idx] = el)}
                              onClick={() => { if (activeApiKey) playParagraph(idx); }}
                              className={`p-2.5 rounded-xl transition-all border ${
                                isActive
                                  ? "bg-sky-500/10 border-sky-300 text-stone-950 font-medium translate-x-1"
                                  : "border-transparent hover:bg-stone-100/30"
                              } ${activeApiKey ? "cursor-pointer" : ""}`}
                            >
                              <p className="relative">
                                {isActive && (
                                  <span className="absolute -left-3.5 top-1 text-sky-500 text-xs animate-bounce">▶</span>
                                )}
                                {para}
                              </p>
                            </div>
                          );
                        })}
                      </div>

                      {/* Editorial Chapter Navigation Footer */}
                      <div className="flex items-center justify-between border-t border-stone-100 pt-8 mt-12 font-mono text-xs">
                        <button
                          disabled={currentChapterIndex === 0}
                          onClick={() => { setCurrentChapterIndex(prev => prev - 1); handleStop(); }}
                          className={`px-4 py-2 rounded-xl font-bold transition-all ${theme.btnSecondary} disabled:opacity-20 disabled:pointer-events-none`}
                        >
                          ← PREVIOUS LOG
                        </button>
                        <span className={`${theme.subtext}`}>0{currentChapterIndex + 1} / 0{storyData.length}</span>
                        <button
                          disabled={currentChapterIndex === storyData.length - 1}
                          onClick={() => { setCurrentChapterIndex(prev => prev + 1); handleStop(); }}
                          className={`px-4 py-2 rounded-xl font-bold transition-all ${theme.btnSecondary} disabled:opacity-20 disabled:pointer-events-none`}
                        >
                          NEXT LOG →
                        </button>
                      </div>

                    </div>
                  )}

                  {/* Active Tab: Creative Muse Generator Console */}
                  {activeTab === "writer" && (
                    <div className="space-y-6 animate-fadeIn">
                      <div>
                        <h2 className={`text-2xl font-black ${theme.heading} tracking-tight font-serif`}>✍️ AX-12's Muse Console</h2>
                        <p className={`text-xs ${theme.subtext} mt-1 leading-normal font-mono`}>
                          Connect to the creative network stack. Input your active Gemini credentials to auto-generate continuing chronicles.
                        </p>
                      </div>

                      <div className="space-y-4">
                        <div>
                          <label className={`text-[10px] font-bold ${theme.subtext} uppercase tracking-wider block mb-1.5 font-mono`}>
                            Narrative Guidance (Write Chapter {storyData.length + 1})
                          </label>
                          <textarea
                            placeholder="e.g. Write a chapter where Tristan and Arlie monitor the first glowing leaf sprouting from the Lumina mainframe, while AX-12 reads its telemetry..."
                            value={writerPrompt}
                            onChange={(e) => setWriterPrompt(e.target.value)}
                            rows={4}
                            className={`w-full rounded-2xl border ${theme.inputBorder} ${theme.inputBg} p-4 text-sm focus:outline-none focus:ring-1 focus:ring-sky-500 font-sans leading-relaxed`}
                          />
                        </div>

                        <button
                          onClick={handleGenerateChapter}
                          disabled={isGeneratingChapter || !writerPrompt.trim()}
                          className={`w-full py-3 rounded-2xl text-xs sm:text-sm font-bold tracking-wider uppercase transition-all ${theme.btnPrimary} disabled:opacity-40 disabled:pointer-events-none`}
                        >
                          {isGeneratingChapter ? "Synthesizing Chapter Log..." : "✨ Draft Continuation with Gemini Engine"}
                        </button>
                      </div>

                      {generatedChapter && (
                        <div className="mt-6 border-t border-stone-100 pt-6 space-y-4 animate-fadeIn">
                          <div className="flex items-center justify-between">
                            <span className="text-[10px] font-mono font-bold text-sky-600 bg-sky-50 px-2 py-1 rounded">DRAFT FOR LOG 0{storyData.length + 1}</span>
                            <button
                              onClick={handleAddGeneratedChapter}
                              className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs rounded-xl shadow-sm transition-all"
                            >
                              ✅ Integrate Into Main Log Book
                            </button>
                          </div>

                          <div className="bg-stone-50 border border-stone-200 p-5 rounded-2xl space-y-4">
                            <h3 className="font-extrabold text-stone-900 text-lg font-serif">{generatedChapter.title}</h3>
                            <pre className="font-mono text-[10px] p-4 bg-stone-950 text-stone-100 rounded-xl overflow-x-auto">
                              {generatedChapter.ascii}
                            </pre>
                            <div className="space-y-3 text-sm text-stone-700 leading-relaxed font-serif">
                              {generatedChapter.paragraphs.map((para, idx) => (
                                <p key={idx}>{para}</p>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {/* Active Tab: Sketches / Gallery compositions */}
                  {activeTab === "sketches" && (
                    <div className="space-y-6 animate-fadeIn">
                      <div>
                        <h2 className={`text-2xl font-black ${theme.heading} tracking-tight font-serif`}>🎨 Architectural Sketches</h2>
                        <p className={`text-xs ${theme.subtext} mt-1 leading-normal font-mono`}>
                          Composition notes modeled in Peter Brown's high-contrast charcoal and wash aesthetics.
                        </p>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2">
                        {ILLUSTRATION_GUIDE.map((item) => (
                          <div key={item.id} className={`p-5 rounded-2xl border ${theme.cardBorder} bg-stone-50/50 space-y-3 flex flex-col justify-between`}>
                            <div>
                              <div className="flex items-center gap-2.5 mb-2">
                                <span className="text-xl p-2 bg-stone-100 rounded-xl">{item.glyph}</span>
                                <h4 className={`font-bold ${theme.heading} text-sm font-serif leading-tight`}>{item.title}</h4>
                              </div>
                              <p className={`text-xs ${theme.text} leading-relaxed italic`}>
                                "{item.desc}"
                              </p>
                            </div>
                            <div className="text-[10px] font-mono uppercase bg-stone-200/50 text-stone-600 px-2 py-1 rounded inline-block text-center mt-3 tracking-wide">
                              MAPPED COMPOSITION 0{item.id}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Active Tab: Appendix & Archival deck */}
                  {activeTab === "appendix" && (
                    <div className="space-y-6 animate-fadeIn">
                      <div>
                        <h2 className={`text-2xl font-black ${theme.heading} tracking-tight font-serif`}>⚓ Archival Appendix</h2>
                        <p className={`text-xs ${theme.subtext} mt-1 leading-normal font-mono`}>
                          Historical parameters and contextual notes governing AX-12's mission loop.
                        </p>
                      </div>

                      <div className="grid grid-cols-1 gap-4 pt-2">
                        
                        {/* Interactive Report Dashboard Link */}
                        <div className="p-5 rounded-2xl border border-sky-100 bg-sky-50/20 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                          <div>
                            <span className="text-[9px] font-mono uppercase tracking-wider text-sky-600 font-bold">Local Filetree Bridge</span>
                            <h4 className="font-bold text-stone-900 text-sm mt-0.5 font-serif">Interactive Report Dashboard</h4>
                            <p className="text-xs text-stone-500 mt-1 leading-normal">
                              Review complete multi-dimensional analytics, data patterns, and behavioral trend charts generated alongside the logs.
                            </p>
                          </div>
                          <a
                            href="./dashboard.html"
                            target="_blank"
                            className="px-4 py-2 bg-sky-600 hover:bg-sky-700 text-white text-xs font-bold rounded-xl shadow-sm transition-all whitespace-nowrap self-stretch sm:self-auto text-center"
                          >
                            📊 Launch Dashboard
                          </a>
                        </div>

                        {/* Dynamic Article Anchor link */}
                        <div className="p-5 rounded-2xl border border-pink-100 bg-pink-50/20 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                          <div>
                            <span className="text-[9px] font-mono uppercase tracking-wider text-pink-600 font-bold">Historical Catalyst</span>
                            <h4 className="font-bold text-stone-900 text-sm mt-0.5 font-serif">The Chronicle: "Bigots vs. Groomers"</h4>
                            <p className="text-xs text-stone-500 mt-1 leading-normal">
                              The real-world report highlighting community-level book challenges, school-board polarizations, and the systemic noise that inspired AX-12's retreat to the silent cave of books.
                            </p>
                          </div>
                          <a
                            href="https://www.chroniclenewspaper.com/news/local-news/bigots-vs-groomers-HN2816933"
                            target="_blank"
                            rel="noopener noreferrer"
                            className="px-4 py-2 bg-pink-600 hover:bg-pink-700 text-white text-xs font-bold rounded-xl shadow-sm transition-all whitespace-nowrap self-stretch sm:self-auto text-center"
                          >
                            🔗 Read Article
                          </a>
                        </div>

                        {/* Concept Note Card */}
                        <div className="p-5 rounded-2xl border border-stone-200 bg-stone-50/50 space-y-3">
                          <h4 className="font-bold text-stone-800 text-xs tracking-tight uppercase font-mono">Systemic Integration Notes:</h4>
                          <p className="text-xs text-stone-600 leading-relaxed font-serif">
                            The ascension of AX-12 from the chaotic valleys of the island to the peaks of silent observation mirrors our collective shift towards quiet, pristine lines of code and away from responding to structural static. In Chapter 9, the closed circuit blooms, manifesting in a single leaf of living luminescent code.
                          </p>
                        </div>

                      </div>
                    </div>
                  )}

                </section>

              </main>

              {/* Publication Footer */}
              <footer className="border-t border-stone-200 bg-stone-50 py-6 px-6 text-center text-[10px] text-stone-400 font-mono tracking-wider">
                THE WILD ENGINEER NARRATIVE MATRIX // TRANSMISSION COMPILATION SEQUENCE IO-01
              </footer>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
